version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cli-deps:
        patterns:
          - "@clack/prompts"
          - "commander"
          - "execa"
          - "magicast"
          - "picocolors"
          - "tinyglobby"
      typescript:
        patterns: ["typescript", "@types/*", "tsup", "tsx"]
      eslint:
        patterns: ["eslint", "eslint-*", "@typescript-eslint/*"]
      testing:
        patterns: ["vitest"]
      changesets:
        patterns: ["@changesets/*"]
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    commit-message: { prefix: "ci" }
